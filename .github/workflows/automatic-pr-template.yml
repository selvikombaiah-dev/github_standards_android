name: Apply Branch PR Template

on:
  pull_request:
    types:
      - opened

permissions:
  pull-requests: write

jobs:
  update-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Template
        id: template
        run: |
          if [ "${{ github.event.pull_request.base.ref }}" = "development" ]; then
            echo "FILE=.github/PULL_REQUEST_TEMPLATE/development.md" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.pull_request.base.ref }}" == release/* ]]; then
            echo "FILE=.github/PULL_REQUEST_TEMPLATE/release.md" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.pull_request.base.ref }}" = "main" ]; then
            echo "FILE=.github/PULL_REQUEST_TEMPLATE/main.md" >> $GITHUB_OUTPUT
          else
            echo "No matching template found"
            exit 1
          fi

      - name: Read Template
        id: content
        run: |
          {
            echo 'BODY<<EOF'
            cat "${{ steps.template.outputs.FILE }}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Update PR Body
        uses: actions/github-script@v7
        env:
          PR_BODY: ${{ steps.content.outputs.BODY }}
        with:
          script: |
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: process.env.PR_BODY
            });

            console.log(
              `PR template applied for target branch: ${context.payload.pull_request.base.ref}`
            );