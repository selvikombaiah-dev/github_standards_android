name: Apply Branch PR Template

on:
  workflow_dispatch:

  pull_request:
    types:
      - opened

permissions:
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Print PR Info
        run: |
          echo "Source: ${{ github.event.pull_request.head.ref }}"
          echo "Target: ${{ github.event.pull_request.base.ref }}"