name: Apply Branch PR Template

on:
  pull_request:
    types:
      - opened

permissions:
  pull-requests: write

jobs:
  update-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Template
        id: template
        run: |
          TARGET="${{ github.event.pull_request.base.ref }}"

          if [ "$TARGET" = "development" ]; then
            echo "FILE=.github/PULL_REQUEST_TEMPLATE/development.md" >> $GITHUB_OUTPUT
          elif [[ "$TARGET" =~ ^release/ ]]; then
            echo "FILE=.github/PULL_REQUEST_TEMPLATE/release.md" >> $GITHUB_OUTPUT
          elif [ "$TARGET" = "main" ]; then
            echo "FILE=.github/PULL_REQUEST_TEMPLATE/main.md" >> $GITHUB_OUTPUT
          else
            echo "No matching template found"
            exit 1
          fi

      - name: Update PR Body
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const templateFile = '${{ steps.template.outputs.FILE }}';
            const templateBody = fs.readFileSync(templateFile, 'utf8');

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: templateBody
            });

            console.log(`Applied template: ${templateFile}`);